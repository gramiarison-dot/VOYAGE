<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .admin-sidebar {
            min-height: 100vh;
            background: #2c3e50;
            padding: 20px 0;
        }
        .admin-sidebar .brand {
            color: #fff;
            font-size: 1.5rem;
            padding: 20px 15px;
            text-align: center;
        }
        .admin-sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
        }
        .admin-sidebar .nav-link:hover,
        .admin-sidebar .nav-link.active {
            background: #3498db;
            color: #fff;
        }
        .admin-sidebar .nav-link i {
            margin-right: 10px;
        }
        .admin-content {
            padding: 20px 30px;
            background: #f8f9fa;
            min-height: 100vh;
        }
        .table thead {
            background: #2c3e50;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 admin-sidebar">
                <div class="brand"><i class="bi bi-airplane"></i> Admin</div>
                <nav class="nav flex-column">
                    <a href="dashboard.html" class="nav-link">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a href="gestion.html" class="nav-link active">
                        <i class="bi bi-gear"></i> Gestion
                    </a>
                    <hr class="border-secondary">
                    <a href="../index.html" class="nav-link">
                        <i class="bi bi-house"></i> Retour site
                    </a>
                </nav>
            </div>
            <div class="col-md-10 admin-content">
                <h2><i class="bi bi-gear text-primary"></i> Gestion</h2>
                <ul class="nav nav-tabs mt-3">
                    <li class="nav-item">
                        <a class="nav-link active" href="#voyages" data-bs-toggle="tab">Voyages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#users" data-bs-toggle="tab">Utilisateurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#reservations" data-bs-toggle="tab">Réservations</a>
                    </li>
                </ul>
                <div class="tab-content mt-3">
                    <div class="tab-pane active" id="voyages">
                        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#voyageModal">
                            <i class="bi bi-plus-circle"></i> Nouveau voyage
                        </button>
                        <table class="table table-hover" id="voyagesTable">
                            <thead>
                                <tr>
                                    <th>Destination</th>
                                    <th>Départ</th>
                                    <th>Date</th>
                                    <th>Prix</th>
                                    <th>Places</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="voyagesTableBody">
                                <tr><td colspan="6" class="text-center">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="tab-pane" id="users">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Email</th>
                                    <th>Rôle</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr><td colspan="4" class="text-center">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="tab-pane" id="reservations">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Client</th>
                                    <th>Voyage</th>
                                    <th>Places</th>
                                    <th>Montant</th>
                                    <th>Statut</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="reservationsTableBody">
                                <tr><td colspan="6" class="text-center">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
