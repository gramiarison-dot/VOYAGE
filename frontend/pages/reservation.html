<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - VoyageReservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-airplane"></i> VoyageReservation
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="text-center mb-4">Réservation de voyage</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="bi bi-ticket"></i> Informations de réservation</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="voyage-select" class="form-label">Voyage</label>
                            <select class="form-select" id="voyage-select">
                                <option value="">Sélectionnez un voyage</option>
                            </select>
                        </div>
                        <div id="voyage-details" style="display: none;">
                            <div class="row">
                                <div class="col-md-6">
                                    <p><strong>Destination:</strong> <span id="dest-detail"></span></p>
                                    <p><strong>Départ:</strong> <span id="depart-detail"></span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>Date départ:</strong> <span id="date-depart-detail"></span></p>
                                    <p><strong>Prix:</strong> <span id="prix-detail"></span> FCFA</p>
                                </div>
                            </div>
                        </div>
                        <form id="reservation-form">
                            <div class="mb-3">
                                <label for="nombre-places" class="form-label">Nombre de places</label>
                                <input type="number" class="form-control" id="nombre-places" min="1" value="1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Montant total</label>
                                <h4 id="montant-total">0 FCFA</h4>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-circle"></i> Confirmer la réservation
                            </button>
                        </form>
                        <div id="reservation-message" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
