<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée - VoyageReservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; display: flex; align-items: center; }
        .error-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 50px; text-align: center; color: #fff; }
        .error-card .icon { font-size: 5rem; color: #4fc3f7; }
        .error-card h1 { font-size: 6rem; font-weight: 900; color: #4fc3f7; }
        .error-card .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 12px 30px; border-radius: 50px; }
        .error-card .btn-primary:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="error-card">
                    <div class="icon"><i class="bi bi-compass"></i></div>
                    <h1>404</h1>
                    <h2 class="fw-bold">Page non trouvée</h2>
                    <p class="text-muted">La page que vous recherchez n'existe pas ou a été déplacée.</p>
                    <a href="/" class="btn btn-primary mt-3">
                        <i class="bi bi-house"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
