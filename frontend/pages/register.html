<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - VoyageReservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-success { background: linear-gradient(135deg, #00b894, #00cec9); border: none; }
        .btn-success:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/pages/index.html">
                <i class="bi bi-airplane"></i> VoyageReservation
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h4><i class="bi bi-person-plus"></i> Créer un compte</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="registerAlert" class="alert d-none" role="alert"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="bi bi-person"></i> Nom d'utilisateur
                                </label>
                                <input type="text" class="form-control" id="username" placeholder="ex: jean_dupont" required minlength="3">
                            </div>
                            <div class="mb-3">
                                <label for="registerEmail" class="form-label">
                                    <i class="bi bi-envelope"></i> Email
                                </label>
                                <input type="email" class="form-control" id="registerEmail" placeholder="exemple@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="registerPassword" class="form-label">
                                    <i class="bi bi-lock"></i> Mot de passe
                                </label>
                                <input type="password" class="form-control" id="registerPassword" placeholder="Minimum 6 caractères" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">
                                    <i class="bi bi-shield-lock"></i> Confirmer le mot de passe
                                </label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmez votre mot de passe" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2" id="registerBtn">
                                <i class="bi bi-person-plus"></i> Créer mon compte
                            </button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <p>Déjà un compte ? 
                                <a href="/pages/login.html" class="text-primary fw-bold">Se connecter</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>

    <script>
        console.log('✅ register.html chargé');

        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', handleRegisterDirect);
                console.log('✅ Formulaire d\'inscription attaché');
            }
        });

        async function handleRegisterDirect(e) {
            e.preventDefault();
            console.log('🔄 Inscription directe...');
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertDiv = document.getElementById('registerAlert');
            const registerBtn = document.getElementById('registerBtn');
            
            if (!username || !email || !password || !confirmPassword) {
                showAlertDirect(alertDiv, 'danger', '⚠️ Veuillez remplir tous les champs');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlertDirect(alertDiv, 'danger', '⚠️ Les mots de passe ne correspondent pas');
                return;
            }
            
            if (password.length < 6) {
                showAlertDirect(alertDiv, 'danger', '⚠️ Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Création...';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                console.log('📦 Réponse:', data);
                
                if (response.ok) {
                    showAlertDirect(alertDiv, 'success', '✅ Compte créé avec succès ! Redirection vers la connexion...');
                    setTimeout(() => window.location.href = '/pages/login.html', 2000);
                } else {
                    showAlertDirect(alertDiv, 'danger', data.message || '❌ Erreur lors de l\'inscription');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="bi bi-person-plus"></i> Créer mon compte';
                }
            } catch (error) {
                console.error('❌ Erreur:', error);
                showAlertDirect(alertDiv, 'danger', '❌ Erreur de connexion au serveur');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="bi bi-person-plus"></i> Créer mon compte';
            }
        }

        function showAlertDirect(alertDiv, type, message) {
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertDiv.classList.remove('d-none');
            setTimeout(() => alertDiv.classList.add('d-none'), 5000);
        }
    </script>
</body>
</html>
